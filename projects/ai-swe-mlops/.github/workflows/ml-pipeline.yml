name: ML Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.9"
  # Minimum acceptable metric values — fail the build if any drop below these
  MIN_ACCURACY:  "0.80"
  MIN_F1:        "0.80"
  MIN_PRECISION: "0.80"
  MIN_RECALL:    "0.80"

jobs:
  # --------------------------------------------------------------------------
  # Job 1: tests
  # --------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # --------------------------------------------------------------------------
  # Job 2: pipeline + metrics gate
  # --------------------------------------------------------------------------
  pipeline:
    name: DVC Pipeline & Metrics Gate
    runs-on: ubuntu-latest
    needs: test          # only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for dvc metrics diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure DVC local remote
        run: python -m dvc remote add -d -f localstore /tmp/dvcstore

      - name: Reproduce DVC pipeline
        run: python -m dvc repro

      - name: Show metrics
        run: python -m dvc metrics show

      - name: Check metrics against HEAD
        run: python -m dvc metrics diff HEAD || echo "No previous metrics to compare"

      - name: Metrics regression gate
        run: |
          python - <<'EOF'
          import json, sys

          with open("reports/metrics.json") as f:
              m = json.load(f)

          thresholds = {
              "accuracy":  float("${{ env.MIN_ACCURACY }}"),
              "f1":        float("${{ env.MIN_F1 }}"),
              "precision": float("${{ env.MIN_PRECISION }}"),
              "recall":    float("${{ env.MIN_RECALL }}"),
          }

          failures = []
          for metric, minimum in thresholds.items():
              value = m.get(metric, 0.0)
              status = "PASS" if value >= minimum else "FAIL"
              print(f"  {status}  {metric}: {value:.6f} (min={minimum})")
              if value < minimum:
                  failures.append(metric)

          if failures:
              print(f"\nMetrics below threshold: {failures}")
              sys.exit(1)
          else:
              print("\nAll metrics passed the regression gate.")
          EOF

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            reports/metrics.json
            reports/confusion_matrix.png

      - name: Upload DVC lock
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dvc-lock
          path: dvc.lock
