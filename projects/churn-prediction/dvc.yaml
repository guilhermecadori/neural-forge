stages:
  prepare:
    cmd: python src/prepare.py
    deps:
      - data/raw/churn.csv
      - src/prepare.py
    outs:
      - data/processed
  train:
    cmd: python src/train.py
    deps:
      - data/processed
      - src/train.py
    outs:
      - models/model.pkl
    metrics:
      - metrics.json:
          cache: false
